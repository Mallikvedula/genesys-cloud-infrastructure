inqueueCall:
  name: TestInQueue
  division: Home, ind,
  defaultLanguage: en-us
  supportedLanguages:
    en-us:
      defaultLanguageSkill:
        noValue: true
      textToSpeech:
        defaultEngine:
          voice: Jill
  settingsInQueueCall:
    holdMusic:
      lit:
        name: PromptSystem.on_hold_music
  settingsActionDefaults:
    playAudioOnSilence:
      timeout:
        lit:
          seconds: 40
    detectSilence:
      timeout:
        lit:
          seconds: 40
    callData:
      processingPrompt:
        noValue: true
    collectInput:
      noEntryTimeout:
        lit:
          seconds: 5
    dialByExtension:
      interDigitTimeout:
        lit:
          seconds: 6
    transferToUser:
      connectTimeout:
        noValue: true
    transferToNumber:
      connectTimeout:
        noValue: true
    transferToGroup:
      connectTimeout:
        noValue: true
    transferToFlowSecure:
      connectTimeout:
        lit:
          seconds: 15
  settingsErrorHandling:
    errorHandling:
      disconnect:
        none: true
    preHandlingAudio:
      tts: Sorry, an error occurred. Please try your call again.
  settingsPrompts:
    ensureAudioInPrompts: false
    promptMediaToValidate:
      - mediaType: audio
      - mediaType: tts
  startUpTaskActions:
    - loop:
        name: InQueueLoop
        currentIndex:
          var: Task.loop
        loopCount:
          lit: 99
        outputs:
          loop:
            actions:
              - playAudio:
                  name: Play Audio
                  audio:
                    tts: Please wait one of our agents is excited to reach you in few minutes
              - holdMusic:
                  name: Hold Music
                  prompt:
                    exp: Flow.HoldPrompt
                  bargeInEnabled:
                    lit: true
                  playStyle:
                    duration:
                      lit:
                        minutes: 1
    - disconnect:
        name: Disconnect
  startUpTaskVariables:
    - integerVariable:
        name: Task.loop
        initialValue:
          noValue: true
